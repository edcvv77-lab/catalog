<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنشورات</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <header class="p-4 border-b border-gray-700 flex items-center justify-between">
    <h1 class="text-3xl font-bold">آخر المنشورات</h1>
    <div class="flex gap-4">
      <button id="newPostBtn" class="btn-custom">منشور جديد</button>
      <a href="chat.html" class="btn-custom">الدردشة</a>
    </div>
  </header>
  <main class="p-4 space-y-4" id="postsContainer">
    <!-- سيتم تحميل البطاقات هنا بواسطة post-card.js -->
  </main>
  <!-- نافذة إنشاء/تعديل منشور -->
  <div id="postModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg w-11/12 max-w-lg">
      <h2 id="postModalTitle" class="text-xl font-bold mb-4">منشور جديد</h2>
      <form id="postForm" class="space-y-4">
        <textarea id="postContent" rows="4" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="اكتب شيئًا..." maxlength="500"></textarea>
        <input id="postImageUrl" type="url" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="رابط صورة (اختياري)">
        <div class="flex gap-4 justify-end">
          <button type="button" id="cancelPostBtn" class="btn-custom bg-gray-600">إلغاء</button>
          <button type="submit" class="btn-custom">نشر</button>
        </div>
      </form>
    </div>
  </div>
  <!-- مكتبات Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="../assets/post-card.js"></script>
  <script src="../assets/feed.js"></script>
</body>
</html>
