<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعديل الملف الشخصي</title>
  <!-- ورقة الأنماط العامة للمنصة -->
  <link rel="stylesheet" href="../assets/style.css">
  <!-- Tailwind لإعادة الضبط ومرونة التصميم -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- تحميل إعدادات الثيم من localStorage قبل عرض الصفحة -->
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold mb-4">تعديل الملف الشخصي</h1>
    <form id="profileEditForm" class="space-y-4 bg-gray-800 bg-opacity-50 p-6 rounded-lg">
      <div>
        <label for="displayName" class="block mb-1">الاسم المعروض</label>
        <input id="displayName" type="text" class="w-full p-2 rounded bg-gray-700 text-gray-100" maxlength="50" required>
      </div>
      <div>
        <label for="bio" class="block mb-1">نبذة مختصرة</label>
        <textarea id="bio" rows="3" class="w-full p-2 rounded bg-gray-700 text-gray-100" maxlength="280"></textarea>
      </div>
      <div>
        <label for="avatarUrl" class="block mb-1">رابط الصورة الرمزية</label>
        <input id="avatarUrl" type="url" class="w-full p-2 rounded bg-gray-700 text-gray-100">
      </div>
      <div id="profileLinksSection">
        <!-- روابط إضافية سيتم حقنها عبر JavaScript -->
      </div>
      <div class="flex gap-4 mt-4">
        <button type="submit" class="btn-custom">حفظ</button>
        <a href="profile.html" class="btn-custom bg-red-600 hover:bg-red-700">إلغاء</a>
      </div>
    </form>
  </div>
  <!-- مكتبات Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="../assets/profile-edit.js"></script>
</body>
</html>
