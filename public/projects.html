<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المشاريع</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <header class="p-4 border-b border-gray-700 flex items-center justify-between">
    <h1 class="text-3xl font-bold">إدارة المشاريع</h1>
    <div class="flex gap-4">
      <button id="newProjectBtn" class="btn-custom">مشروع جديد</button>
      <a href="tasks.html" class="btn-custom">المهام</a>
      <a href="chat.html" class="btn-custom">الدردشة</a>
    </div>
  </header>
  <main class="p-4 space-y-4" id="projectsContainer">
    <!-- سيتم تحميل قائمة المشاريع هنا بواسطة projects.js -->
  </main>
  <!-- نافذة إنشاء/تعديل مشروع -->
  <div id="projectModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg w-11/12 max-w-lg">
      <h2 id="projectModalTitle" class="text-xl font-bold mb-4">مشروع جديد</h2>
      <form id="projectForm" class="space-y-4">
        <input id="projectName" type="text" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="اسم المشروع" maxlength="100" required>
        <textarea id="projectDescription" rows="3" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="وصف المشروع" maxlength="500"></textarea>
        <div>
          <label for="projectStatus" class="block mb-1">الحالة</label>
          <select id="projectStatus" class="w-full p-2 rounded bg-gray-700 text-gray-100">
            <option value="idea">فكرة</option>
            <option value="planning">قيد التخطيط</option>
            <option value="active">فعّال</option>
            <option value="paused">متوقف مؤقتًا</option>
            <option value="done">مكتمل</option>
          </select>
        </div>
        <div class="flex gap-4 justify-end">
          <button type="button" id="cancelProjectBtn" class="btn-custom bg-gray-600">إلغاء</button>
          <button type="submit" class="btn-custom">حفظ</button>
        </div>
      </form>
    </div>
  </div>
  <!-- مكتبات Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="../assets/projects.js"></script>
</body>
</html>
