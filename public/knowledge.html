<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز المعرفة</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <header class="p-4 border-b border-gray-700 flex items-center justify-between">
    <h1 class="text-3xl font-bold">مركز المعرفة</h1>
    <div class="flex gap-4">
      <button id="newArticleBtn" class="btn-custom">مقال جديد</button>
      <a href="feed.html" class="btn-custom">المنشورات</a>
      <a href="chat.html" class="btn-custom">الدردشة</a>
    </div>
  </header>
  <main class="p-4 space-y-4" id="knowledgeContainer">
    <!-- سيعرض قائمة المقالات والتصنيفات عبر knowledge.js -->
  </main>
  <!-- نافذة إنشاء/تعديل مقال -->
  <div id="articleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg w-11/12 max-w-xl overflow-auto max-h-screen">
      <h2 id="articleModalTitle" class="text-xl font-bold mb-4">مقال جديد</h2>
      <form id="articleForm" class="space-y-4">
        <input id="articleTitle" type="text" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="عنوان المقال" maxlength="150" required>
        <select id="articleCategory" class="w-full p-2 rounded bg-gray-700 text-gray-100"></select>
        <textarea id="articleContent" rows="6" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="المحتوى" required></textarea>
        <div class="flex gap-4 justify-end">
          <button type="button" id="cancelArticleBtn" class="btn-custom bg-gray-600">إلغاء</button>
          <button type="submit" class="btn-custom">حفظ</button>
        </div>
      </form>
    </div>
  </div>
  <!-- مكتبات Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="../assets/knowledge.js"></script>
</body>
</html>
