<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المالك المتقدمة</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <div class="flex h-screen">
    <!-- الشريط الجانبي للقوائم -->
    <nav id="ownerSidebar" class="w-64 bg-opacity-30 backdrop-blur-md p-4 hidden md:block">
      <h2 class="text-xl font-semibold mb-4">لوحة التحكم</h2>
      <ul class="space-y-2">
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="dashboard">الرئيسية</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="users">المستخدمون</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="rooms">الغرف</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="community">المجتمع</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="projects">المشاريع</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="support">الدعم</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="security">الأمان</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="content">المحتوى</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="settings">الإعدادات</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="theme">الثيم</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="audit">السجل</button></li>
        <li><button class="owner-nav-item btn-custom w-full text-right" data-section="health">الصحة</button></li>
      </ul>
      <div class="mt-6">
        <button id="ownerSignOut" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded w-full">خروج</button>
      </div>
    </nav>
    <!-- محتوى الصفحات -->
    <main id="ownerMain" class="flex-1 overflow-y-auto p-4">
      <section id="dashboardSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">لوحة المعلومات</h3>
        <div id="dashboardCards" class="grid md:grid-cols-3 gap-4"></div>
      </section>
      <section id="usersSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">إدارة المستخدمين</h3>
        <input id="userSearchInput" type="text" class="p-2 rounded mb-3 w-full" placeholder="بحث عن مستخدم..." />
        <div id="usersTable" class="overflow-x-auto"></div>
      </section>
      <section id="roomsSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">إدارة الغرف</h3>
        <button id="ownerCreateRoomBtn" class="btn-custom mb-3">إنشاء غرفة جديدة</button>
        <div id="roomsTable" class="overflow-x-auto"></div>
      </section>
      <!-- قسم المجتمع: إدارة المنشورات، التعليقات، البلاغات، الإعلانات -->
      <section id="communitySection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">التحكم في المجتمع</h3>
        <p class="mb-2 text-gray-300">يتضمن التحكم في المنشورات، التعليقات، البلاغات، والإعلانات.</p>
        <div id="communityControls" class="space-y-4"></div>
      </section>
      <!-- قسم البلاغات (للإبقاء على التوافق مع الإصدارات السابقة يمكن إعادة استخدامه داخل community) -->
      <section id="reportsSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">البلاغات</h3>
        <div id="reportsList" class="space-y-4"></div>
      </section>
      <!-- قسم الإعلانات (يمكن الوصول إليه من community control أو content control) -->
      <section id="announcementsSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">الإعلانات</h3>
        <button id="createAnnouncementBtn" class="btn-custom mb-3">إنشاء إعلان</button>
        <div id="announcementsList" class="space-y-4"></div>
      </section>
      <!-- قسم المشاريع -->
      <section id="projectsSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">التحكم في المشاريع</h3>
        <div id="projectsAdmin" class="space-y-4"></div>
      </section>
      <!-- قسم الدعم -->
      <section id="supportSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">مركز الدعم</h3>
        <div id="supportAdmin" class="space-y-4"></div>
      </section>
      <!-- قسم الأمان -->
      <section id="securitySection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">مركز الأمان</h3>
        <div id="securityAdmin" class="space-y-4"></div>
      </section>
      <!-- قسم المحتوى -->
      <section id="contentSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">إدارة المحتوى</h3>
        <div id="contentAdmin" class="space-y-4"></div>
      </section>
      <!-- قسم الثيم -->
      <section id="themeSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">إعدادات الثيم</h3>
        <div id="themeAdmin" class="space-y-4"></div>
      </section>
      <section id="settingsSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">الإعدادات العامة</h3>
        <div id="settingsForm" class="space-y-4"></div>
      </section>
      <section id="auditSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">سجل الأحداث</h3>
        <div id="auditLogs" class="space-y-4"></div>
      </section>
      <section id="healthSection" class="owner-section hidden">
        <h3 class="text-2xl font-semibold mb-4">صحة النظام</h3>
        <div id="healthStatus" class="space-y-4"></div>
      </section>
    </main>
    <!-- زر لفتح القائمة الجانبية في الجوال -->
    <button id="openSidebarBtn" class="fixed bottom-4 right-4 md:hidden btn-custom z-50">☰</button>
  </div>

  <!-- مودال لإنشاء غرفة من لوحة المالك -->
  <div id="ownerCreateRoomModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-30">
    <div class="bg-gray-800 p-6 rounded shadow-lg w-full max-w-md">
      <h3 class="text-lg font-semibold mb-4">إنشاء غرفة جديدة</h3>
      <label class="block mb-2" for="ownerNewRoomNameInput">اسم الغرفة</label>
      <input id="ownerNewRoomNameInput" type="text" class="w-full p-2 rounded mb-3" placeholder="اسم الغرفة" />
      <label class="block mb-2" for="ownerNewRoomTypeSelect">نوع الغرفة</label>
      <select id="ownerNewRoomTypeSelect" class="w-full p-2 rounded mb-4">
        <option value="public">عامة</option>
        <option value="private">خاصة</option>
        <option value="secret">سرية</option>
      </select>
      <div class="flex justify-end gap-2">
        <button id="ownerCancelCreateRoom" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">إلغاء</button>
        <button id="ownerConfirmCreateRoom" class="btn-custom">إنشاء</button>
      </div>
    </div>
  </div>

  <!-- سكربتات -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <!-- تحميل utils.js كسكربت عادي بدلاً من module -->
  <script src="../assets/utils.js"></script>
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/realtime.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="../assets/owner.js"></script>
</body>
</html>
