<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المهام</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <header class="p-4 border-b border-gray-700 flex items-center justify-between">
    <h1 class="text-3xl font-bold">إدارة المهام</h1>
    <div class="flex gap-4">
      <button id="newTaskBtn" class="btn-custom">مهمة جديدة</button>
      <a href="projects.html" class="btn-custom">المشاريع</a>
      <a href="chat.html" class="btn-custom">الدردشة</a>
    </div>
  </header>
  <main class="p-4" id="tasksContainer">
    <!-- سيتم تحميل لوحة المهام هنا بواسطة tasks.js -->
  </main>
  <!-- نافذة إنشاء/تعديل مهمة -->
  <div id="taskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg w-11/12 max-w-lg">
      <h2 id="taskModalTitle" class="text-xl font-bold mb-4">مهمة جديدة</h2>
      <form id="taskForm" class="space-y-4">
        <input id="taskTitle" type="text" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="عنوان المهمة" maxlength="100" required>
        <textarea id="taskDescription" rows="3" class="w-full p-2 rounded bg-gray-700 text-gray-100" placeholder="وصف المهمة" maxlength="500"></textarea>
        <div>
          <label for="taskAssignee" class="block mb-1">تعيين إلى</label>
          <select id="taskAssignee" class="w-full p-2 rounded bg-gray-700 text-gray-100"></select>
        </div>
        <div class="flex gap-4">
          <label for="taskPriority" class="block mb-1">الأولوية</label>
          <select id="taskPriority" class="w-full p-2 rounded bg-gray-700 text-gray-100">
            <option value="low">منخفضة</option>
            <option value="medium">متوسطة</option>
            <option value="high">عالية</option>
            <option value="critical">حرجة</option>
          </select>
        </div>
        <div class="flex gap-4">
          <label for="taskStatus" class="block mb-1">الحالة</label>
          <select id="taskStatus" class="w-full p-2 rounded bg-gray-700 text-gray-100">
            <option value="todo">قيد الانتظار</option>
            <option value="doing">قيد التنفيذ</option>
            <option value="review">قيد المراجعة</option>
            <option value="done">مكتملة</option>
          </select>
        </div>
        <div class="flex gap-4 justify-end">
          <button type="button" id="cancelTaskBtn" class="btn-custom bg-gray-600">إلغاء</button>
          <button type="submit" class="btn-custom">حفظ</button>
        </div>
      </form>
    </div>
  </div>
  <!-- مكتبات Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="../assets/tasks.js"></script>
</body>
</html>
