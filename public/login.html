<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول أو إنشاء حساب</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- تحميل إعدادات الثيم والألوان -->
  <script src="../assets/load-settings.js"></script>
</head>
<body>
  <div class="container">
    <h1 class="text-2xl font-bold mb-4 text-center">تسجيل الدخول أو إنشاء حساب</h1>
    <div id="authError" class="error" style="display:none;"></div>
    <div class="grid md:grid-cols-2 gap-4">
      <!-- نموذج تسجيل الدخول -->
      <form id="signInForm" class="bg-gray-800 p-4 rounded shadow">
        <h2 class="text-xl font-semibold mb-2">تسجيل الدخول</h2>
        <label class="block mb-1" for="signin-email">البريد الإلكتروني</label>
        <input id="signin-email" name="email" type="email" class="w-full p-2 mb-3 bg-gray-700 rounded" placeholder="البريد الإلكتروني" required>
        <label class="block mb-1" for="signin-password">كلمة المرور</label>
        <input id="signin-password" name="password" type="password" class="w-full p-2 mb-3 bg-gray-700 rounded" placeholder="كلمة المرور" required>
        <button type="submit" class="w-full btn-custom">دخول</button>
      </form>
      <!-- نموذج إنشاء حساب -->
      <form id="signUpForm" class="bg-gray-800 p-4 rounded shadow">
        <h2 class="text-xl font-semibold mb-2">إنشاء حساب</h2>
        <!-- حقل الاسم المعروض للمستخدم -->
        <label class="block mb-1" for="signup-display-name">الاسم المعروض</label>
        <input id="signup-display-name" name="display_name" type="text" class="w-full p-2 mb-3 bg-gray-700 rounded" placeholder="اسمك الذي سيظهر للمستخدمين" required>
        <label class="block mb-1" for="signup-email">البريد الإلكتروني</label>
        <input id="signup-email" name="email" type="email" class="w-full p-2 mb-3 bg-gray-700 rounded" placeholder="البريد الإلكتروني" required>
        <label class="block mb-1" for="signup-password">كلمة المرور</label>
        <input id="signup-password" name="password" type="password" class="w-full p-2 mb-3 bg-gray-700 rounded" placeholder="كلمة المرور" required>
        <button type="submit" class="w-full btn-custom">إنشاء حساب</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <!-- تحميل API لجلب البيانات من Supabase -->
  <script src="../assets/supabase-api.js"></script>
  <script src="../assets/auth.js"></script>
</body>
</html>
